<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Mirror</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    :root {
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-mid: #378ADD;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --amber: #7A4F00;
      --amber-light: #FFF4DC;
      --gray: #5F5E5A;
      --gray-light: #F1EFE8;
      --border: rgba(0,0,0,0.12);
      --text: #1a1a1a;
      --text-muted: #5F5E5A;
      --radius: 8px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; color: var(--text);
      background: #fff; padding: 16px; line-height: 1.5;
    }
    h1 {
      font-size: 16px; font-weight: 600; margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    h1 svg { flex-shrink: 0; }
    .subtitle { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }

    .card {
      border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      padding: 12px 14px; margin-bottom: 12px; background: #fff;
    }
    .card-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 10px;
    }

    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
    select, input[type="text"] {
      width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius);
      padding: 7px 10px; font-size: 13px; font-family: inherit;
      background: #fafafa; color: var(--text); outline: none;
    }
    select:focus, input:focus { border-color: var(--blue-mid); background: #fff; }
    select:disabled, input:disabled { opacity: 0.5; cursor: not-allowed; }

    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row label { margin-bottom: 0; flex-shrink: 0; }
    .row input[type="number"] { width: 64px; text-align: center; }
    .row span { font-size: 12px; color: var(--text-muted); }

    button {
      width: 100%; padding: 9px 14px; border-radius: var(--radius); border: none;
      font-size: 13px; font-family: inherit; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: var(--gray-light); color: var(--gray); border: 0.5px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #e3e1da; }
    .btn-add { background: var(--blue-light); color: var(--blue); border: 0.5px solid rgba(24,95,165,0.2); margin-top: 10px; }
    .btn-add:hover:not(:disabled) { background: #d0e8f8; }

    #status {
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 12px; display: none; margin-bottom: 12px;
    }
    #status.info    { background: var(--blue-light);  color: #0C447C;      display: block; }
    #status.success { background: var(--green-light); color: var(--green); display: block; }
    #status.error   { background: var(--red-light);   color: var(--red);   display: block; }
    #status.warning { background: var(--amber-light); color: var(--amber); display: block; }

    /* Mapping rows */
    #mappingList { display: flex; flex-direction: column; gap: 10px; }

    .mapping-row {
      border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      padding: 11px 12px 13px; background: #fafafa;
    }
    .mapping-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 9px;
    }
    .mapping-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-muted);
    }
    .btn-remove {
      background: var(--red-light); color: var(--red);
      border: 0.5px solid rgba(163,45,45,0.2);
      padding: 4px 9px; width: auto; font-size: 11px; font-weight: 600;
      border-radius: var(--radius);
    }
    .btn-remove:hover { background: #f5d5d5; }

    .mapping-fields { display: flex; flex-direction: column; gap: 7px; }
    .field-group { display: flex; flex-direction: column; gap: 3px; }

    .mbx-row { display: flex; gap: 6px; align-items: flex-end; }
    .mbx-row input { flex: 1; }
    .btn-load {
      background: var(--blue-light); color: var(--blue);
      border: 0.5px solid rgba(24,95,165,0.2);
      padding: 7px 11px; width: auto; font-size: 12px; font-weight: 600;
      border-radius: var(--radius); flex-shrink: 0;
    }
    .btn-load:hover:not(:disabled) { background: #d0e8f8; }
    .btn-load:disabled { opacity: 0.45; cursor: not-allowed; }

    .arrow { text-align: center; font-size: 15px; color: var(--blue-mid); line-height: 1; }

    /* Stats */
    .stat-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .stat { background: var(--gray-light); border-radius: var(--radius); padding: 8px; text-align: center; }
    .stat-num { font-size: 20px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }

    #log {
      background: var(--gray-light); border-radius: var(--radius);
      padding: 8px 10px; font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px; max-height: 160px; overflow-y: auto;
      display: none; color: var(--text-muted); line-height: 1.6;
    }
    #log.visible { display: block; }
    .log-line { margin-bottom: 2px; }
    .log-ok  { color: #3B6D11; }
    .log-err { color: var(--red); }
    .log-hdr { color: var(--blue); font-weight: 600; }
  </style>
</head>
<body>

<h1>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/><path d="M17 14l-5 5-2-2"/>
  </svg>
  Calendar Mirror
</h1>
<p class="subtitle">Mirror multiple shared calendars into your personal calendars</p>

<div id="status"></div>

<!-- Auth -->
<div class="card">
  <div class="card-title">Authentication</div>
  <button class="btn-secondary" id="btnSignIn" onclick="signIn()">Sign in with Microsoft</button>
  <div id="userInfo" style="display:none; font-size:12px; color:var(--text-muted);">
    Signed in as <strong id="userName"></strong>
    &nbsp;·&nbsp;<a href="#" onclick="signOut()" style="color:var(--blue)">Sign out</a>
  </div>
</div>

<!-- Mappings -->
<div class="card">
  <div class="card-title">Calendar mappings</div>
  <div id="mappingList"></div>
  <button class="btn-add" id="btnAdd" onclick="addMapping()" disabled>+ Add mapping</button>
</div>

<!-- Sync window -->
<div class="card">
  <div class="card-title">Sync window</div>
  <div class="row">
    <label>Past</label>
    <input type="number" id="daysPast" value="30" min="0" max="365" />
    <span>days</span>
  </div>
  <div class="row" style="margin-bottom:0">
    <label>Future</label>
    <input type="number" id="daysFuture" value="365" min="1" max="730" />
    <span>days</span>
  </div>
</div>

<div class="stat-row" id="statsRow" style="display:none">
  <div class="stat"><div class="stat-num" id="statCreated">0</div><div class="stat-label">Created</div></div>
  <div class="stat"><div class="stat-num" id="statUpdated">0</div><div class="stat-label">Updated</div></div>
  <div class="stat"><div class="stat-num" id="statDeleted">0</div><div class="stat-label">Deleted</div></div>
</div>

<button class="btn-primary" id="btnSync" onclick="runSync()" disabled>Run mirror sync</button>

<hr class="divider" />
<div id="log"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CLIENT_ID    = "YOUR_AZURE_CLIENT_ID";
const TENANT_ID    = "YOUR_TENANT_ID";
const REDIRECT_URI = window.location.origin + window.location.pathname;
// ─────────────────────────────────────────────────────────────────────────────

const SCOPES = ["Calendars.ReadWrite", "User.Read"];

let msalApp, account, accessToken;
let myCalendars = [];  // the signed-in user's own calendars
let mappingSeq  = 0;
let stats = { created: 0, updated: 0, deleted: 0 };

// ── MSAL ──────────────────────────────────────────────────────────────────────
Office.onReady(() => {
  msalApp = new msal.PublicClientApplication({
    auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: REDIRECT_URI },
    cache: { cacheLocation: "sessionStorage" }
  });
  msalApp.handleRedirectPromise()
    .then(resp => resp ? finishSignIn(resp) : tryAutoSignIn())
    .catch(e => setStatus("Auth error: " + e.message, "error"));
});

function tryAutoSignIn() {
  const accounts = msalApp.getAllAccounts();
  if (accounts.length > 0) {
    account = accounts[0];
    msalApp.acquireTokenSilent({ scopes: SCOPES, account })
      .then(r => { accessToken = r.accessToken; afterSignIn(); })
      .catch(() => updateAuthUI(false));
  } else {
    updateAuthUI(false);
  }
}

async function signIn() { await msalApp.loginRedirect({ scopes: SCOPES }); }

function finishSignIn(resp) {
  account = resp.account;
  accessToken = resp.accessToken;
  afterSignIn();
}

async function afterSignIn() {
  updateAuthUI(true);
  setStatus("Loading your calendars…", "info");
  try {
    const tr = await msalApp.acquireTokenSilent({ scopes: SCOPES, account });
    accessToken = tr.accessToken;
    const own = await graphGet("/me/calendars?$top=50");
    myCalendars = own.value.map(c => ({ id: c.id, name: c.name }));
    setStatus("Signed in. Configure mappings below.", "success");
    document.getElementById("btnAdd").disabled  = false;
    document.getElementById("btnSync").disabled = false;
    if (document.getElementById("mappingList").children.length === 0) addMapping();
  } catch(e) {
    setStatus("Failed to load your calendars: " + e.message, "error");
  }
}

function signOut() { msalApp.logoutRedirect(); }

function updateAuthUI(signedIn) {
  document.getElementById("btnSignIn").style.display = signedIn ? "none" : "block";
  document.getElementById("userInfo").style.display  = signedIn ? "block" : "none";
  if (signedIn) document.getElementById("userName").textContent = account.username;
}

// ── Graph ─────────────────────────────────────────────────────────────────────
async function graphGet(path) {
  const r = await fetch("https://graph.microsoft.com/v1.0" + path,
    { headers: { Authorization: "Bearer " + accessToken } });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function graphPost(path, body) {
  const r = await fetch("https://graph.microsoft.com/v1.0" + path, {
    method: "POST",
    headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function graphPatch(path, body) {
  const r = await fetch("https://graph.microsoft.com/v1.0" + path, {
    method: "PATCH",
    headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function graphDelete(path) {
  const r = await fetch("https://graph.microsoft.com/v1.0" + path,
    { method: "DELETE", headers: { Authorization: "Bearer " + accessToken } });
  if (!r.ok && r.status !== 404) throw new Error(await r.text());
}
async function getAllEvents(basePath, start, end) {
  let url = `${basePath}?startDateTime=${start}&endDateTime=${end}&$top=100` +
            `&$select=id,subject,start,end,location,body,isAllDay,showAs,lastModifiedDateTime,categories`;
  const events = [];
  while (url) {
    const page = await graphGet(url.replace("https://graph.microsoft.com/v1.0", ""));
    events.push(...(page.value || []));
    url = page["@odata.nextLink"] || null;
  }
  return events;
}

// ── Mapping row UI ────────────────────────────────────────────────────────────
function dstOptions() {
  if (!myCalendars.length) return '<option value="">— sign in first —</option>';
  return myCalendars.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function addMapping() {
  const id   = ++mappingSeq;
  const list = document.getElementById("mappingList");
  const div  = document.createElement("div");
  div.className = "mapping-row";
  div.id = "mapping-" + id;
  div.innerHTML = `
    <div class="mapping-header">
      <span class="mapping-label">Mapping ${id}</span>
      <button class="btn-remove" onclick="removeMapping(${id})">✕ Remove</button>
    </div>
    <div class="mapping-fields">
      <div class="field-group">
        <label>Shared mailbox address</label>
        <div class="mbx-row">
          <input type="text" id="mbx-${id}" placeholder="team@yourdomain.com" />
          <button class="btn-load" id="loadBtn-${id}" onclick="loadSharedCals(${id})">Load</button>
        </div>
      </div>
      <div class="field-group">
        <label>Source calendar (shared)</label>
        <select id="src-${id}" disabled>
          <option value="">— enter mailbox and click Load —</option>
        </select>
      </div>
      <div class="arrow">↓</div>
      <div class="field-group">
        <label>Destination calendar (yours)</label>
        <select id="dst-${id}">${dstOptions()}</select>
      </div>
    </div>`;
  list.appendChild(div);
}

function removeMapping(id) {
  const el = document.getElementById("mapping-" + id);
  if (el) el.remove();
}

async function loadSharedCals(id) {
  const mbx = document.getElementById("mbx-" + id).value.trim();
  if (!mbx) { setStatus(`Mapping ${id}: enter a mailbox address first.`, "error"); return; }
  const btn = document.getElementById("loadBtn-" + id);
  btn.disabled = true; btn.textContent = "…";
  try {
    const tr = await msalApp.acquireTokenSilent({ scopes: SCOPES, account });
    accessToken = tr.accessToken;
    const shared = await graphGet(`/users/${encodeURIComponent(mbx)}/calendars?$top=50`);
    const sel = document.getElementById("src-" + id);
    sel.innerHTML = '<option value="">— pick a calendar —</option>' +
      shared.value.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
    sel.disabled = false;
    btn.textContent = "✓";
  } catch(e) {
    setStatus(`Mapping ${id}: ${e.message}`, "error");
    btn.disabled = false; btn.textContent = "Load";
  }
}

// ── Collect & validate all mappings ──────────────────────────────────────────
function collectMappings() {
  const rows = document.querySelectorAll(".mapping-row");
  const mappings = [], errors = [];
  const usedDst  = new Set();

  rows.forEach(row => {
    const id  = row.id.replace("mapping-", "");
    const mbx = document.getElementById(`mbx-${id}`)?.value.trim() || "";
    const src = document.getElementById(`src-${id}`)?.value || "";
    const dst = document.getElementById(`dst-${id}`)?.value || "";

    // Skip entirely blank rows silently
    if (!mbx && !src) return;

    if (!mbx)      { errors.push(`Mapping ${id}: missing mailbox address.`); return; }
    if (!src)      { errors.push(`Mapping ${id}: no source calendar selected (click Load).`); return; }
    if (!dst)      { errors.push(`Mapping ${id}: no destination calendar selected.`); return; }
    if (src === dst) { errors.push(`Mapping ${id}: source and destination must differ.`); return; }
    if (usedDst.has(dst)) {
      errors.push(`Mapping ${id}: destination calendar already used by another mapping.`); return;
    }
    usedDst.add(dst);
    mappings.push({ id, mbx, src, dst });
  });

  return { mappings, errors };
}

// ── Sync one mapping ──────────────────────────────────────────────────────────
async function syncOne({ id, mbx, src, dst }, startISO, endISO) {
  log(`── Mapping ${id}: ${mbx} ──`, "hdr");

  const srcEvents = await getAllEvents(
    `/users/${encodeURIComponent(mbx)}/calendars/${src}/calendarView`, startISO, endISO);
  log(`  ${srcEvents.length} source event(s) found.`);

  const dstEvents = await getAllEvents(`/me/calendars/${dst}/calendarView`, startISO, endISO);

  // Build lookup: sourceEventId → mirrored dest event
  const dstByTag = {};
  for (const e of dstEvents) {
    const tag = (e.categories || []).find(c => c.startsWith("_mid:"));
    if (tag) dstByTag[tag.slice(5)] = e;
  }

  const srcIds = new Set(srcEvents.map(e => e.id));

  // Delete orphans (source event was deleted)
  for (const [srcEventId, dstEvent] of Object.entries(dstByTag)) {
    if (!srcIds.has(srcEventId)) {
      log(`  Delete orphan: ${dstEvent.subject}`);
      await graphDelete(`/me/events/${dstEvent.id}`);
      stats.deleted++; showStats();
    }
  }

  // Create or update
  for (const srcEvent of srcEvents) {
    const existing = dstByTag[srcEvent.id];
    const payload  = buildPayload(srcEvent);

    if (existing) {
      // Compare stored last-modified timestamp to detect changes
      const storedLM = (existing.body?.content || "").match(/lm:([^\n]+)/)?.[1]?.trim();
      if (srcEvent.lastModifiedDateTime !== storedLM) {
        log(`  Update: ${srcEvent.subject}`);
        await graphPatch(`/me/events/${existing.id}`, payload);
        stats.updated++; showStats();
      }
      // else: unchanged — skip
    } else {
      log(`  Create: ${srcEvent.subject}`);
      await graphPost(`/me/calendars/${dst}/events`, payload);
      stats.created++; showStats();
    }
  }

  log(`  Mapping ${id} complete.`, "ok");
}

// ── Main entry point ──────────────────────────────────────────────────────────
async function runSync() {
  const { mappings, errors } = collectMappings();

  if (errors.length)    { setStatus(errors.join(" | "), "error");   return; }
  if (!mappings.length) { setStatus("No valid mappings configured.", "warning"); return; }

  document.getElementById("btnSync").disabled = true;
  stats = { created: 0, updated: 0, deleted: 0 };
  showStats(); clearLog(); showLog();
  setStatus(`Syncing ${mappings.length} mapping(s)…`, "info");

  try {
    const tr = await msalApp.acquireTokenSilent({ scopes: SCOPES, account });
    accessToken = tr.accessToken;

    const past    = parseInt(document.getElementById("daysPast").value)   || 30;
    const future  = parseInt(document.getElementById("daysFuture").value) || 365;
    const start   = new Date(); start.setDate(start.getDate() - past);
    const end     = new Date(); end.setDate(end.getDate() + future);

    for (const mapping of mappings) {
      await syncOne(mapping, start.toISOString(), end.toISOString());
    }

    setStatus(
      `Done — ${mappings.length} mapping(s): ` +
      `${stats.created} created, ${stats.updated} updated, ${stats.deleted} deleted.`,
      "success"
    );
    log("All done.", "ok");
  } catch(e) {
    setStatus("Sync failed: " + e.message, "error");
    log("Error: " + e.message, "err");
  }
  document.getElementById("btnSync").disabled = false;
}

// ── Payload ───────────────────────────────────────────────────────────────────
function buildPayload(src) {
  return {
    subject: "[Mirror] " + src.subject,
    start: src.start, end: src.end,
    location: src.location,
    isAllDay: src.isAllDay,
    showAs: src.showAs || "free",
    sensitivity: "normal",
    isReminderOn: false,
    categories: ["_mid:" + src.id, "Mirrored"],
    body: {
      contentType: "text",
      content: `[Mirrored from shared calendar]\nlm:${src.lastModifiedDateTime}\n\n${src.body?.content || ""}`
    }
  };
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg; el.className = type;
}
function log(msg, cls) {
  const el   = document.getElementById("log");
  const line = document.createElement("div");
  line.className = "log-line" + (cls ? " log-" + cls : "");
  line.textContent = new Date().toLocaleTimeString() + "  " + msg;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById("log").innerHTML = ""; }
function showLog()  { document.getElementById("log").classList.add("visible"); }
function showStats() {
  document.getElementById("statsRow").style.display = "grid";
  document.getElementById("statCreated").textContent = stats.created;
  document.getElementById("statUpdated").textContent = stats.updated;
  document.getElementById("statDeleted").textContent = stats.deleted;
}
</script>
</body>
</html>
